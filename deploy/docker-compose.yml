services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DEMO_MODE: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://47.95.124.205}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    ports:
      - "80:8080"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
